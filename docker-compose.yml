# Kafka (лаб. 3–4): Zookeeper, brokers, UI, producer, streams
# Lakehouse (лаб. 5): MinIO, Polaris, Trino — Trino UI :8080; Kafka UI перенесено на :18080
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka1:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  kafka2:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka2
    depends_on:
      - zookeeper
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:29092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - kafka1
      - kafka2
    command: >
      bash -c "
      echo 'Waiting for Kafka brokers...' &&
      cub kafka-ready -b kafka1:29092 1 120 &&
      cub kafka-ready -b kafka2:29092 1 120 &&
      kafka-topics --create --if-not-exists --topic Topic1 --bootstrap-server kafka1:29092 --partitions 2 --replication-factor 2 &&
      kafka-topics --create --if-not-exists --topic Topic2 --bootstrap-server kafka1:29092 --partitions 2 --replication-factor 2 &&
      kafka-topics --create --if-not-exists --topic lab4-avg-duration-by-day --bootstrap-server kafka1:29092 --partitions 2 --replication-factor 2 &&
      kafka-topics --create --if-not-exists --topic lab4-trip-count-by-day --bootstrap-server kafka1:29092 --partitions 2 --replication-factor 2 &&
      kafka-topics --create --if-not-exists --topic lab4-top-start-station-by-day --bootstrap-server kafka1:29092 --partitions 2 --replication-factor 2 &&
      kafka-topics --create --if-not-exists --topic lab4-top3-stations-by-day --bootstrap-server kafka1:29092 --partitions 2 --replication-factor 2 &&
      echo 'All topics are ready.'
      "

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka1
      - kafka2
    ports:
      - "18080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: lab3
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:29092,kafka2:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka1:29092,kafka2:29092
      KAFKA_TOPIC_1: Topic1
      KAFKA_TOPIC_2: Topic2
      CSV_FILE: /data/trips.csv
      MAX_RECORDS: "500"
    volumes:
      - ./Divvy_Trips_2019_Q4.csv:/data/trips.csv:ro

  streams:
    build:
      context: .
      dockerfile: streams/Dockerfile
    depends_on:
      producer:
        condition: service_completed_successfully
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka1:29092,kafka2:29092
    restart: unless-stopped

  # --- Lab 5: Iceberg lakehouse (Polaris + MinIO + Trino) ---
  minio:
    image: minio/minio:latest
    hostname: minio
    volumes:
      - ./minio_data:/data
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: dummy-region
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      MINIO_DOMAIN: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: ["server", "/data", "--console-address", ":9001"]
    networks:
      local-iceberg-lakehouse:
        aliases:
          - warehouse.minio

  minio-client:
    image: minio/mc:latest
    depends_on:
      - minio
    networks:
      - local-iceberg-lakehouse
    volumes:
      - /tmp:/tmp
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: dummy-region
    entrypoint: >
      /bin/sh -c "
      until mc alias set minio http://minio:9000 admin password; do echo '...waiting...' && sleep 1; done;
      mc rm -r --force minio/warehouse 2>/dev/null || true;
      mc mb minio/warehouse;
      mc anonymous set public minio/warehouse;
      tail -f /dev/null
      "

  polaris:
    image: apache/polaris:latest
    platform: linux/amd64
    depends_on:
      minio:
        condition: service_started
      minio-client:
        condition: service_started
    ports:
      - "8181:8181"
      - "8182:8182"
    networks:
      - local-iceberg-lakehouse
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: dummy-region
      AWS_ENDPOINT_URL_S3: http://minio:9000
      AWS_ENDPOINT_URL_STS: http://minio:9000
      POLARIS_BOOTSTRAP_CREDENTIALS: default-realm,root,secret
      "polaris.features.DROP_WITH_PURGE_ENABLED": "true"
      "polaris.realm-context.realms": default-realm
    healthcheck:
      # Polaris 1.x: management / SmallRye health on port 8182 (8181 /healthcheck returns 404)
      test: ["CMD-SHELL", "curl -sf http://localhost:8182/q/health/live >/dev/null || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 30s

  trino:
    image: trinodb/trino:latest
    depends_on:
      polaris:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      TRINO_JVM_OPTS: -Xmx2G
    networks:
      - local-iceberg-lakehouse
    volumes:
      - ./trino/catalog:/etc/trino/catalog

networks:
  local-iceberg-lakehouse:
    name: local-iceberg-lakehouse
